<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L & R Dear Museum</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        
        <div class="logo-section">
          <img src="menulogo_wo.png" alt="SBHS Logo">

        <div class="museum-text">
            <h1>L & R Dear Museum</h1>
           
            <p>
                Preserving our history<br>
                inspiring our future
            </p>
    
            </div>
        </div>
   
     <nav>
       <div class="nav-links">

        <a href="#">
            <strong>About</strong><br>
            SBHS
        </a>

        <a href="#">
            <strong>Visit</strong><br>
            Toro mai
        </a>

        <a href="#">
            <strong>Learn</strong><br>
            Āko
        </a>

    </div>
</nav>
   
<div class="header-right">
  
    <input type="text" placeholder="Search">

    <div class="socials">
     <span>📘</span>
     <span>💼</span>
     <span>📷</span>
     <span>▶️</span>
     <span>🎵</span>
  </div>

    <button class="donate-btn">
       Donate
    </button>
   
 </div>
 
 </header>

<section class="notice-bar">

    <div class="notice-content">
        <span>🎟️</span>

        <p>
            Free museum entry for people in New Zealand and people living in Southland.
        </p>
</div>

        <button class="visit-btn">
            Plan your visit →
        </button>
   
</section>

<section class="hero">
    
    <div class="overlay"></div>

    <div class="hero-content">
    
         <h2>
            Southland Boys' High School
         </h2>

    </div>
    
    <div class="line"></div>

    <p>
        Explore the stories, treasures
        and traditions that have shaped 
        generations.
    </p>

    <button class="explore-btn">
        Explore the Museum →
    </button>

</div>
</section>
</header>
</body>
</html>
